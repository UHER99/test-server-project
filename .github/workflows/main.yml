name: Deploy Main

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: [self-hosted, test-server-project]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Remove old container
        run: |
          echo "Removing old container if exists..."
          docker stop my_test_project || true
          docker rm my_test_project || true

      - name: Deploy with Docker Compose
        run: |
          echo "Stopping old compose services..."
          docker-compose down || true

          echo "Building new image..."
          docker-compose build --no-cache

          echo "Starting new container..."
          docker-compose up -d

      - name: Health Check
        run: |
          echo "Waiting for container to be ready..."
          for i in 1 2 3 4 5 6; do
            sleep 5
            echo "Attempt $i: checking health..."
            if docker exec my_test_project curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
          done
          echo "Health check failed!"
          docker-compose logs
          exit 1

      - name: Cleanup old images
        run: |
          echo "Cleaning up..."
          docker image prune -f
          echo "Deploy completed!"
