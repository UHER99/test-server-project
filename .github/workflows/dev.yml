name: Deploy Dev

on:
  push:
    branches:
      - dev

jobs:
  build-and-deploy:
    runs-on: [self-hosted, test-server-project]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Restart application
        run: pm2 restart my_test_project || pm2 start npm --name "my_test_project" -- start
